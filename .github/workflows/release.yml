name: Release
on:
  release:
    types:
      - published

jobs:
  build-k8e:
    name: Build k8e
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ secrets.RELEASE_TAG }}
      GOOS: linux
      GOARCH: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y pkg-config build-essential libc6-dev zlib1g-dev libseccomp-dev \
          || sudo yum install -y glibc-static zlib-static libseccomp-static libseccomp-devel
      - name: Generate resources
        run: |
          mkdir -p build/data build/static
          make deps
          zig build download
          make generate
      - name: Build k8e
        run: make k8e
      - name: Package bin
        run: make package-cli
      - name: Package airgap image
        run: make package-airgap
      - name: sha256sum
        run: cd dist/artifacts/ && sha256sum k8e k8e-airgap-images.tar.gz >> k8e-hashes.txt
      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/artifacts/k8e
            dist/artifacts/k8e-airgap-images.tar.gz
            dist/artifacts/k8e-images.txt
            dist/artifacts/k8e-hashes.txt

  build-sandbox:
    name: Build sandbox image
    runs-on: ubuntu-latest
    needs: build-k8e
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build sandboxd binaries
        run: cd sandboxd && zig build sandboxd
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Sanitize tag
        id: tag
        run: echo "value=$(echo '${{ github.ref_name }}' | tr '+' '-')" >> $GITHUB_OUTPUT
      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/xiaods/k8e-sandbox:${{ steps.tag.outputs.value }}
            ghcr.io/xiaods/k8e-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
