name: Release
on:
  release:
    types:
      - published

jobs:
  build-k8e:
    name: Build k8e (${{ matrix.goarch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
            runs-on: ubuntu-latest
            artifact: k8e
            airgap: k8e-airgap-images.tar.gz
            images: k8e-images.txt
            hashes: k8e-hashes.txt
          - goarch: arm64
            goos: linux
            runs-on: [self-hosted, linux, ARM64]
            artifact: k8e-arm64
            airgap: k8e-airgap-images-arm64.tar.gz
            images: k8e-images-arm64.txt
            hashes: k8e-hashes-arm64.txt
    env:
      RELEASE_TAG: ${{ secrets.RELEASE_TAG }}
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y pkg-config build-essential libc6-dev zlib1g-dev libseccomp-dev \
          || sudo yum install -y glibc-static zlib-static libseccomp-static libseccomp-devel
      - name: Generate resources
        run: |
          mkdir -p build/data build/static
          make deps
          zig build download
          make generate
      - name: Build k8e
        run: make k8e
      - name: Package bin
        run: make package-cli
      - name: Package airgap image
        run: make package-airgap
      - name: sha256sum
        run: cd dist/artifacts/ && sha256sum ${{ matrix.artifact }} ${{ matrix.airgap }} >> ${{ matrix.hashes }}
      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/artifacts/${{ matrix.artifact }}
            dist/artifacts/${{ matrix.airgap }}
            dist/artifacts/${{ matrix.images }}
            dist/artifacts/${{ matrix.hashes }}

  build-sandbox:
    name: Build sandbox image
    runs-on: ubuntu-latest
    needs: build-k8e
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build sandboxd binaries
        run: cd sandboxd && zig build sandboxd
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            xiaods/k8e-sandbox:${{ github.ref_name }}
            xiaods/k8e-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
