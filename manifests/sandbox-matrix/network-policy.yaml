apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandbox-warm-deny-all
  namespace: sandbox-matrix
spec:
  endpointSelector:
    matchLabels:
      sandbox.k8e.io/state: warm
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: ANY
