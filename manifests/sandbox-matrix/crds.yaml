apiVersion: v1
kind: Namespace
metadata:
  name: sandbox-matrix
  labels:
    app.kubernetes.io/managed-by: k8e
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxmatrices.k8e.cattle.io
spec:
  group: k8e.cattle.io
  names:
    kind: SandboxMatrix
    listKind: SandboxMatrixList
    plural: sandboxmatrices
    singular: sandboxmatrix
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              warmPoolSize: {type: integer}
              runtimeClass: {type: string}
              sessionTTL: {type: integer}
              defaultAllowedHosts:
                type: array
                items: {type: string}
          status:
            type: object
            properties:
              readyWarmCount: {type: integer}
              activeSessions: {type: integer}
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: WarmPool
      type: integer
      jsonPath: .spec.warmPoolSize
    - name: Runtime
      type: string
      jsonPath: .spec.runtimeClass
    - name: Active
      type: integer
      jsonPath: .status.activeSessions
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxsessions.k8e.cattle.io
spec:
  group: k8e.cattle.io
  names:
    kind: SandboxSession
    listKind: SandboxSessionList
    plural: sandboxsessions
    singular: sandboxsession
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              tenantID: {type: string}
              allowedHosts:
                type: array
                items: {type: string}
              runtimeClass: {type: string}
              parentSessionID: {type: string}
              depth: {type: integer}
          status:
            type: object
            properties:
              phase: {type: string}
              podName: {type: string}
              podIP: {type: string}
              workspacePVC: {type: string}
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Pod
      type: string
      jsonPath: .status.podName
    - name: Runtime
      type: string
      jsonPath: .spec.runtimeClass
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxwarmpools.k8e.cattle.io
spec:
  group: k8e.cattle.io
  names:
    kind: SandboxWarmPool
    listKind: SandboxWarmPoolList
    plural: sandboxwarmpools
    singular: sandboxwarmpool
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              size: {type: integer}
              runtimeClass: {type: string}
              templateRef:
                type: object
                properties:
                  name: {type: string}
          status:
            type: object
            properties:
              readyCount: {type: integer}
              pendingCount: {type: integer}
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Size
      type: integer
      jsonPath: .spec.size
    - name: Ready
      type: integer
      jsonPath: .status.readyCount
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxtemplates.k8e.cattle.io
spec:
  group: k8e.cattle.io
  names:
    kind: SandboxTemplate
    listKind: SandboxTemplateList
    plural: sandboxtemplates
    singular: sandboxtemplate
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              runtimeClass: {type: string}
              image: {type: string}
              allowedHosts:
                type: array
                items: {type: string}
    additionalPrinterColumns:
    - name: Runtime
      type: string
      jsonPath: .spec.runtimeClass
    - name: Image
      type: string
      jsonPath: .spec.image
