apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-mcp-sse
  namespace: sandbox-matrix
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-mcp-sse
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-mcp-sse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-mcp-sse
subjects:
- kind: ServiceAccount
  name: sandbox-mcp-sse
  namespace: sandbox-matrix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-mcp-sse
  namespace: sandbox-matrix
  labels:
    app: sandbox-mcp-sse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-mcp-sse
  template:
    metadata:
      labels:
        app: sandbox-mcp-sse
    spec:
      serviceAccountName: sandbox-mcp-sse
      automountServiceAccountToken: false
      volumes:
      - name: k8e-bin
        hostPath:
          path: /var/lib/k8e/data/current/bin/k8e
          type: File
      - name: k8e-tls
        hostPath:
          path: /var/lib/k8e/server/tls
          type: Directory
      containers:
      - name: mcp-sse
        image: busybox:musl
        command: ["/k8e", "sandbox-mcp", "--http", "--http-addr", ":8811"]
        ports:
        - containerPort: 8811
          hostPort: 8811
          name: http
        env:
        - name: K8E_SANDBOX_ENDPOINT
          value: "sandbox-grpc-gateway.sandbox-matrix.svc:50051"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
            ephemeral-storage: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
            ephemeral-storage: "128Mi"
        volumeMounts:
        - name: k8e-bin
          mountPath: /k8e
        - name: k8e-tls
          mountPath: /var/lib/k8e/server/tls
          readOnly: true
